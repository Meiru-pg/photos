<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Travel Instagram</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #262626;
        }

        /* 상단 프로필 영역 */
        header {
            max-width: 935px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #dbdbdb;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #efefef;
            margin-right: 60px;
            overflow: hidden;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 15px;
        }

        .profile-bio p {
            font-size: 16px;
            line-height: 1.5;
        }

        .profile-bio .bold {
            font-weight: 600;
        }

        /* 사진 피드 영역 (인스타그램 3열 그리드) */
        main {
            max-width: 935px;
            margin: 0 auto;
            padding: 30px 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1 / 1;
            background-color: #efefef;
            cursor: pointer;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        /* 마우스를 올렸을 때 사진 이름이 뜨는 오버레이 */
        .gallery-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* 어두워지는 효과 */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 10px;
            text-align: center;
        }

        /* 호버 시 텍스트 나타나고 사진 살짝 확대 */
        .gallery-item:hover .gallery-item-overlay {
            opacity: 1;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
        }

        /* 반응형 레이아웃 (모바일 화면) */
        @media (max-width: 735px) {
            header {
                padding: 20px;
                flex-direction: row;
            }
            .profile-img {
                width: 80px;
                height: 80px;
                margin-right: 25px;
            }
            .profile-info h1 {
                font-size: 22px;
            }
            .gallery {
                gap: 3px; /* 모바일 인스타처럼 간격 좁게 */
            }
            .gallery-item-overlay {
                font-size: 14px; /* 모바일에서는 글씨를 작게 */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="profile-img">
            <img src="https://lh3.googleusercontent.com/d/1ZNs_E6fbUGhVCxjJj-R_-quPaAAlrHNT" alt="프로필 사진">
        </div>
        <div class="profile-info">
            <h1>@photo_gyeom</h1>
            <div class="profile-bio">
                <p class="bold">송대겸</p>

        </div>
    </header>

    <main>
        <div class="gallery">
            
            <div class="gallery-item">

                <div class="gallery-item-overlay">일본 무도관</div>
            </div>

            <div class="gallery-item">

            <div class="gallery-item">

                <div class="gallery-item-overlay">하코네 신사</div>

            <div class="gallery-item">
                <img src="https://lh3.googleusercontent.com/d/1mS1O7-W1Xw_kfiz-mjtghn_cygoNi6W4" alt="평화의 토리이">
                <div class="gallery-item-overlay">평화의 토리이</div>
            </div>

            <div class="gallery-item">
                <img src="https://lh3.googleusercontent.com/d/15U-ry512N2XNMgbH8WueQlLO8NP_3Oe5" alt="하코네 고라 공원">
                <div class="gallery-item-overlay">하코네 고라 공원</div>
            </div>

            <div class="gallery-item">
                <img src="https://lh3.googleusercontent.com/d/1EeMICphLeRvwIHR0YPlWpkiKCAdfI2zY" alt="하코네 유모토 역">
                <div class="gallery-item-overlay">하코네 유모토 역</div>
            </div>

            <div class="gallery-item">
                <img src="https://lh3.googleusercontent.com/d/18umUVt9vb7tMSlO8NmN3cYbYOhlrOr78" alt="고쿄 가이엔">

            <div class="gallery-item">

            </div>

            <div class="gallery-item">

            <div class="gallery-item">

                <div class="gallery-item-overlay">우에노 공원 앞</div>
            </div>

            <div class="gallery-item">
                <img src="https://lh3.googleusercontent.com/d/1K-gq3JMS5br-02XMPHSrUBwBoxvXh4jD" alt="고조텐·하나조노이나리 신사">
                <div class="gallery-item-overlay">고조텐·하나조노이나리 신사</div>
            </div>

            <div class="gallery-item">
                <img src="https://lh3.googleusercontent.com/d/1CvCAxKQ0WUmnq-hefqXTWkNMwy9NS3oz" alt="눈 오는 숙소 앞">
                <div class="gallery-item-overlay">눈 오는 숙소 앞</div>
            </div>

        </div>
    </main>

</body>
</html>
